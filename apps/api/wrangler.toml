name = "okresni-masina-api"
main = "src/index.ts"
compatibility_date = "2025-03-14"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "okresni-masina-db"
database_id = "local"
migrations_dir = "migrations"

# KV Namespaces — session, cache, leaderboardy
[[kv_namespaces]]
binding = "SESSION_KV"
id = "local"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "local"

# R2 Bucket — seed data (obce, jména), avatary
[[r2_buckets]]
binding = "SEED_DATA"
bucket_name = "okresni-masina-seed"

# Cron Triggers — tick systém (časy v UTC, CET = UTC+1)
[triggers]
crons = [
  "0 19 * * 3",   # St 20:00 CET — ligový/pohárový zápas
  "0 14 * * 6",   # So 15:00 CET — ligový zápas
  "0 14 * * 0",   # Ne 15:00 CET — ligový zápas (nabitý týden)
  "0 3 * * *",    # Denně 4:00 CET — denní tick (trénink, eventy, regenerace)
]

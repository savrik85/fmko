name = "okresni-masina-api"
main = "src/index.ts"
compatibility_date = "2025-03-14"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "okresni-masina-db"
database_id = "local"
migrations_dir = "migrations"

# KV Namespaces — session, cache, leaderboardy
[[kv_namespaces]]
binding = "SESSION_KV"
id = "local"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "local"

# R2 Bucket — seed data (obce, jména), avatary
[[r2_buckets]]
binding = "SEED_DATA"
bucket_name = "okresni-masina-seed"

# Cron Triggers — dva hlavní crony
[triggers]
crons = [
  "0 3 * * *",    # Denní tick 4:00 CET — posun dne, tréninky, finance, absence zprávy
  "0 17 * * *",   # Zápasový tick 18:00 CET — simulace zápasů naplánovaných na dnešek
]

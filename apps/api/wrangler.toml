name = "prales-api"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

[vars]
VAPID_SUBJECT = "mailto:admin@prales.fun"

# ═══ PRODUCTION (default — main branch) ═══

[[d1_databases]]
binding = "DB"
database_name = "prales-db-prod"
database_id = "87dfc1ba-d4f5-4158-8163-9f933b5d3571"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "8937f279d9a742339e53408470289ff1"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "6f565d070b8b4b7aa2d17009f484ec16"

[[r2_buckets]]
binding = "SEED_DATA"
bucket_name = "prales-seed"

[triggers]
crons = [
  "0 3 * * *",
  "0 16 * * *",
  "5 16 * * *",
]

[[routes]]
pattern = "api.prales.fun"
custom_domain = true

# ═══ TESTING (testing branch) ═══

[env.testing]
name = "prales-api-test"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "api-test.prales.fun", custom_domain = true }
]

[env.testing.vars]
VAPID_SUBJECT = "mailto:admin@prales.fun"

[[env.testing.d1_databases]]
binding = "DB"
database_name = "prales-db-test"
database_id = "50b683da-6948-4ae5-8fe8-ee41a40d2e17"
migrations_dir = "migrations"

[[env.testing.kv_namespaces]]
binding = "SESSION_KV"
id = "5b7afe5ba1a646bca2c1c4f55eb5591a"

[[env.testing.kv_namespaces]]
binding = "CACHE_KV"
id = "f2900579992a4a8da17986f9b7d83f01"

[[env.testing.r2_buckets]]
binding = "SEED_DATA"
bucket_name = "prales-seed"

[env.testing.triggers]
crons = []
